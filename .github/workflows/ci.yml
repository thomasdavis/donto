name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - 'crates/pg_donto/**'
      - 'lean/**'
      - 'docs/**'
      - '*.md'
      - 'LICENSE-*'
  pull_request:
    paths-ignore:
      - 'crates/pg_donto/**'
      - 'lean/**'
      - 'docs/**'
      - '*.md'
      - 'LICENSE-*'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: donto
          POSTGRES_PASSWORD: donto
          POSTGRES_DB: donto
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U donto -d donto"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DONTO_TEST_DSN: postgres://donto:donto@127.0.0.1:55432/donto
      RUST_BACKTRACE: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --workspace --all-targets --locked

      - name: cargo test
        run: cargo test --workspace --locked -- --nocapture

  msrv:
    # Enforce the rust-version floor declared in Cargo.toml. If a dep bump
    # requires a newer toolchain, bump Cargo.toml rust-version deliberately
    # rather than letting it drift. No Postgres: this only has to compile.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.78 (MSRV)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.78"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: cargo check --locked (workspace compiles on MSRV)
        run: cargo check --workspace --all-targets --locked
