name: pg_donto extension build

on:
  push:
    branches: [main]
    paths:
      - 'crates/pg_donto/**'
      - 'sql/migrations/**'
      - '.github/workflows/ext.yml'
  pull_request:
    paths:
      - 'crates/pg_donto/**'
      - 'sql/migrations/**'
      - '.github/workflows/ext.yml'

jobs:
  pgrx:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg: [pg14, pg15, pg16, pg17]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/pg_donto/target
          key: ${{ runner.os }}-pgrx-${{ matrix.pg }}-${{ hashFiles('crates/pg_donto/Cargo.toml') }}

      - name: Install Postgres dev headers
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          sudo apt-get update
          PG_VER="${PG_FEAT#pg}"
          sudo apt-get install -y postgresql-${PG_VER} postgresql-server-dev-${PG_VER} libpq-dev
        env:
          PG_FEAT: ${{ matrix.pg }}

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version 0.12.7

      - name: pgrx init
        run: cargo pgrx init --${{ matrix.pg }} $(which pg_config)
        working-directory: crates/pg_donto

      - name: Build extension
        run: cargo pgrx package --features ${{ matrix.pg }} --no-default-features
        working-directory: crates/pg_donto

      - name: Run pg_test suite
        run: cargo pgrx test ${{ matrix.pg }} --features ${{ matrix.pg }} --no-default-features
        working-directory: crates/pg_donto
