name: pg_donto extension build

on:
  push:
    branches: [main]
    paths:
      - 'packages/pg_donto/**'
      - 'packages/sql/migrations/**'
      - 'scripts/pgrx-build.sh'
      - '.github/workflows/ext.yml'
  pull_request:
    paths:
      - 'packages/pg_donto/**'
      - 'packages/sql/migrations/**'
      - 'scripts/pgrx-build.sh'
      - '.github/workflows/ext.yml'

jobs:
  pgrx:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg: [14, 15, 16, 17]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build pgrx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/pg_donto/Dockerfile
          build-args: |
            PG_VERSION=${{ matrix.pg }}
          tags: donto-pgrx-pg${{ matrix.pg }}
          load: true
          cache-from: type=gha,scope=pgrx-${{ matrix.pg }}
          cache-to: type=gha,scope=pgrx-${{ matrix.pg }},mode=max

      - name: Run pgrx test suite
        run: docker run --rm donto-pgrx-pg${{ matrix.pg }}
