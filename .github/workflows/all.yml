name: all

# Always-on umbrella workflow. The three scoped workflows (ci, ext, lean)
# use path filters so they skip on unrelated PRs; this one runs every push
# and PR so branch protection has a single stable required-check name
# regardless of which files a change touches.
#
# Keep the work here cheap and path-independent — the heavy suites live in
# ci.yml (Rust workspace + Postgres), ext.yml (pgrx matrix), lean.yml.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-quick-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo metadata (workspace parses)
        run: cargo metadata --format-version 1 --no-deps > /dev/null

      - name: Required repo files present
        run: |
          set -eu
          for f in LICENSE-APACHE LICENSE-MIT README.md PRD.md CLAUDE.md; do
            test -f "$f" || { echo "missing: $f"; exit 1; }
          done
